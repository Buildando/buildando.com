name: Deploy

# Builds the static site and deploys dist/ to your host's public_html on push to
# main (REQ-025). Transfers only the build output; every credential comes from
# GitHub Actions secrets, never the repository (REQ-026).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_SSH_HOST     your server host, e.g. server.example.com
#   DEPLOY_SSH_USER     your (cPanel) username
#   DEPLOY_SSH_KEY      a private key whose public half is in ~/.ssh/authorized_keys on the host
#   DEPLOY_SSH_PORT     SSH port — 22 for standard SSH, often 2222 on cPanel shared hosting
#   DEPLOY_TARGET_DIR   absolute path, e.g. /home/USER/public_html
#
# On cPanel shared hosting SSH is frequently disabled by default and on a
# non-standard port — enable it and confirm the port first. If SSH cannot be
# enabled, use the FTP fallback documented in README.md instead of this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci
      - run: npm run build # astro build + pagefind index
      - run: npm test # unit tests + build-output assertions (dist/ now exists)

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: ${{ secrets.DEPLOY_TARGET_DIR }}
          remote_host: ${{ secrets.DEPLOY_SSH_HOST }}
          remote_port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          remote_user: ${{ secrets.DEPLOY_SSH_USER }}
          remote_key: ${{ secrets.DEPLOY_SSH_KEY }}
