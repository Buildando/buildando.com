<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Buildando">
  <rect width="32" height="32" rx="8" fill="#2f6df6"/>
  <!-- prompt >_ (build sendo executado) -->
  <g fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="8.5,9 12.5,12 8.5,15"/>
    <line x1="14.5" y1="15" x2="19.5" y2="15"/>
  </g>
  <!-- barra de progresso do build -->
  <rect x="7" y="20" width="18" height="4" rx="2" fill="#fff" opacity="0.35"/>
  <rect x="7" y="20" width="10.5" height="4" rx="2" fill="#fff"/>
</svg>
